name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Producto/backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tea
          POSTGRES_PASSWORD: tea
          POSTGRES_DB: tealink_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tea -d tealink_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Producto/backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://tea:tea@localhost:5432/tealink_test
      - run: npm run test:seed
        env:
          DATABASE_URL: postgresql://tea:tea@localhost:5432/tealink_test
      - run: npm test
        env:
          DATABASE_URL: postgresql://tea:tea@localhost:5432/tealink_test
          JWT_SECRET: ci-test-secret
      - uses: docker/setup-buildx-action@v3
      - name: Build backend Docker image
        uses: docker/build-push-action@v6
        with:
          context: Producto/backend
          push: false
          load: true
          tags: tea-link-api:ci

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Producto/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Producto/frontend/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
        env:
          VITE_API_URL: https://api.example.com
