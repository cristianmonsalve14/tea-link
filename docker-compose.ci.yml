services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tea
      POSTGRES_PASSWORD: tea
      POSTGRES_DB: tealink_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tea -d tealink_test"]
      interval: 5s
      timeout: 5s
      retries: 10
