services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tea
      POSTGRES_PASSWORD: tea
      POSTGRES_DB: tealink
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tea -d tealink"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./Producto/backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://tea:tea@db:5432/tealink
      PORT: "3000"
      JWT_SECRET: dev-secret-change-in-production
      CORS_ORIGIN: http://localhost:5173
      NODE_ENV: production
    ports:
      - "3000:3000"

volumes:
  pgdata:
